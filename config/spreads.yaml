# ============================================================
#  Spread Universe Configuration
#  To ADD a spread: add an entry under the correct commodity.
#  To ADD a commodity: copy an existing block and update it.
#  No Python changes required — just edit this file.
# ============================================================
#
#  prophetx_prefix: the ProphetX symbol prefix for this commodity.
#    Corn       → @C      e.g. @CN24 = Corn July 2024
#    Wheat      → @W      e.g. @WZ24 = Wheat December 2024
#    Soy Meal   → @SM     e.g. @SMN24 = Soy Meal July 2024
#    Cattle     → @LC     e.g. @LCZ24 = Live Cattle December 2024
#    Hogs       → @LH     e.g. @LHZ24 = Lean Hogs December 2024
#    Nat Gas    → @NG     e.g. @NGN24 = Nat Gas July 2024
#
#  Month letter codes:
#    F=Jan  G=Feb  H=Mar  J=Apr  K=May  M=Jun
#    N=Jul  Q=Aug  U=Sep  V=Oct  X=Nov  Z=Dec
#
#  year_offset:
#    0 = contract expires in the season year
#    1 = contract expires in season year + 1
#    e.g. Dec-Mar spread: December is offset 0, March is offset 1
#
#  Window logic:
#    start_mmdd / end_mmdd define the season window on the x-axis.
#    If start_mmdd > end_mmdd the window wraps across a calendar year.
# ============================================================

commodities:

  Corn:
    unit: "cents/bu"
    prophetx_prefix: "@C"
    spreads:
      - id: "C_N-U"
        name: "Jul-Sep"
        window: {start_mmdd: "07-15", end_mmdd: "07-10"}
        legs:
          - {month: "N", year_offset: 0}   # July
          - {month: "U", year_offset: 0}   # September

      - id: "C_U-Z"
        name: "Sep-Dec"
        window: {start_mmdd: "09-15", end_mmdd: "09-10"}
        legs:
          - {month: "U", year_offset: 0}   # September
          - {month: "Z", year_offset: 0}   # December

      - id: "C_Z-H"
        name: "Dec-Mar"
        window: {start_mmdd: "12-15", end_mmdd: "12-10"}
        legs:
          - {month: "Z", year_offset: 0}   # December (season year)
          - {month: "H", year_offset: 1}   # March    (season year + 1)

      - id: "C_Z-N"
        name: "Dec-Jul"
        window: {start_mmdd: "12-15", end_mmdd: "12-10"}
        legs:
          - {month: "Z", year_offset: 0}   # December (season year)
          - {month: "N", year_offset: 1}   # July     (season year + 1)

