# config/calendar.yaml
# ---------------------------------------------------------------------------
# Market events calendar for the spread dashboard.
#
# Sources:
#   • USDA NASS — 2026 Agricultural Statistics Board Calendar
#     (https://www.nass.usda.gov/Publications/Calendar/)
#   • US federal holidays (CME/NYMEX/ICE-equity floor closures align here;
#     CBOT grain/livestock electronic markets observe these too, plus
#     Good Friday for grains)
#
# Annual refresh: in December, replace this file with next year's data
# from the published NASS calendar.
#
# Categories drive sidebar filtering and color coding on the page:
#   grains      — Crop Production, Grain Stocks, Crop Progress, etc.
#   livestock   — Cattle on Feed, Hogs & Pigs, Livestock Slaughter, etc.
#   dairy       — Milk Production, Cold Storage (dairy portions), etc.
#   energy      — EIA Petroleum / Natural Gas Storage (generated by
#                 provider, not stored here)
#   prices      — Agricultural Prices
#   holiday     — Federal / exchange closures
#
# Time codes from the NASS PDF legend:
#   PFEI_NOON  — Principal Federal Economic Indicator, 12:00 PM ET
#   PFEI_3PM   — Principal Federal Economic Indicator,  3:00 PM ET
#   1200       — 12:00 PM ET release
#   1500       — 3:00 PM ET (default for NASS reports not otherwise marked)
#   1600       — 4:00 PM ET release (Crop Progress)
# ---------------------------------------------------------------------------

holidays_2026:
  - {date: 2026-01-01, label: "New Year's Day",       exchanges: [CME, NYMEX, ICE]}
  - {date: 2026-01-19, label: "Martin Luther King Jr. Day", exchanges: [CME, NYMEX, ICE]}
  - {date: 2026-02-16, label: "Presidents' Day",      exchanges: [CME, NYMEX, ICE]}
  - {date: 2026-04-03, label: "Good Friday",          exchanges: [CME, NYMEX, ICE]}
  - {date: 2026-05-25, label: "Memorial Day",         exchanges: [CME, NYMEX, ICE]}
  - {date: 2026-06-19, label: "Juneteenth",           exchanges: [CME, NYMEX, ICE]}
  - {date: 2026-07-03, label: "Independence Day (observed)", exchanges: [CME, NYMEX, ICE]}
  - {date: 2026-09-07, label: "Labor Day",            exchanges: [CME, NYMEX, ICE]}
  - {date: 2026-10-12, label: "Columbus Day",         exchanges: [NYMEX, ICE]}
  - {date: 2026-11-11, label: "Veterans Day",         exchanges: [NYMEX, ICE]}
  - {date: 2026-11-26, label: "Thanksgiving",         exchanges: [CME, NYMEX, ICE]}
  - {date: 2026-11-27, label: "Day after Thanksgiving (early close)", exchanges: [CME, NYMEX, ICE]}
  - {date: 2026-12-25, label: "Christmas Day",        exchanges: [CME, NYMEX, ICE]}

